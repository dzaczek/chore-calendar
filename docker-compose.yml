services:
  chore-planner:
    build: .
    container_name: chore-planner
    restart: unless-stopped
    ports:
      - "8000:8000"

    # --- Read-only filesystem ---
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=10m

    # --- Security hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # No capabilities needed - pure HTTP server

    # --- Resource limits ---
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M

    # --- Network ---
    networks:
      - frontend

    # --- Logging ---
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

    # --- Health check ---
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  frontend:
    driver: bridge
