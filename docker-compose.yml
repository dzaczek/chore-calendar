services:
  chore-planner:
    build: .
    container_name: chore-planner
    restart: unless-stopped
    expose:
      - "8000"

    # --- Read-only filesystem ---
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=10m
    volumes:
      - access-logs:/var/log/gunicorn

    # --- Security hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # --- Resource limits ---
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M

    # --- Network ---
    networks:
      - internal

    # --- Logging ---
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

    # --- Health check ---
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  goaccess:
    image: allinurl/goaccess:latest
    container_name: chore-goaccess
    restart: unless-stopped
    command:
      - "--log-file=/logs/access.log"
      - "--log-format=COMBINED"
      - "--output=/report/index.html"
      - "--real-time-html"
      - "--ws-url=ws://localhost:7890"
      - "--html-report-title=Chore Planner Stats"
      - "--port=7890"
      - "--addr=0.0.0.0"
      - "--no-ip-validation"
      - "--exclude-ip=127.0.0.1"
    ports:
      - "127.0.0.1:7890:7890"
    volumes:
      - access-logs:/logs:ro
      - goaccess-report:/report
    networks:
      - internal
      - external
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  goaccess-web:
    image: nginx:alpine
    container_name: chore-goaccess-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:7891:80"
    volumes:
      - goaccess-report:/usr/share/nginx/html:ro
    networks:
      - external
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=10m
      - /var/run:size=1m
      - /tmp:size=1m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: chore-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    env_file:
      - .env

    # --- Security hardening ---
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # --- Resource limits ---
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

    # --- Network ---
    networks:
      - internal
      - external

    depends_on:
      chore-planner:
        condition: service_healthy

    # --- Logging ---
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  access-logs:
  goaccess-report:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
